name: Build & Deploy Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          chmod +x scripts/setup-deps.sh
          ./scripts/setup-deps.sh

      - name: Build EPUB
        run: python3 scripts/build-epub.py

      - name: Build PDFs
        run: |
          python3 scripts/build-pdf.py \
            --variant both \
            --git-hash "${{ github.sha }}" \
            --build-date "$(date -u +%Y-%m-%d)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-ai-company
          path: |
            output/sovereign-ai-company.epub
            output/sovereign-ai-company.pdf
            output/sovereign-ai-company-print.pdf

      - name: Azure Login
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Blob Storage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          for file in sovereign-ai-company.epub sovereign-ai-company.pdf sovereign-ai-company-print.pdf; do
            if [ -f "output/$file" ]; then
              az storage blob upload \
                --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
                --container-name downloads \
                --name "$file" \
                --file "output/$file" \
                --overwrite \
                --auth-mode login
              echo "Deployed: $file"
            fi
          done
